                            var args = Array.prototype.slice.call(arguments);
                            console.log("[ColorboxAI.Shell.BridgeProxy] Error callback triggered. Forwarding to iframe callback:", errorcb);
                            try {
                                event.source.postMessage({
                                    protocol: "colorbox-ai-bridge",
                                    version: 1,
                                    direction: "host-to-frame",
                                    type: "bridge.callback",
                                    payload: {
                                        callbackName: errorcb,
                                        args: args
                                    }
                                }, "*");
                            } catch (err) {
                                console.error("[ColorboxAI.Shell.BridgeProxy] Failed to postMessage error callback to iframe:", err);
                            }
                            delete window[proxyErrorName];
                            if (proxySuccessName) delete window[proxySuccessName];
                        };
                    }
                    var ua = navigator.userAgent || "";
                    var isIOS = /\(i[^;]+;( U;)? CPU.+Mac OS X/i.test(ua);
                    try {
                        if (isIOS) {
                            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.ClientBridge) {
                                window.webkit.messageHandlers.ClientBridge.postMessage({
                                    method: method,
                                    data: bridgeData || {},
                                    successcb: proxySuccessName,
                                    errorcb: proxyErrorName
                                });
                            } else {
                                console.warn("[ColorboxAI.Shell.BridgeProxy] iOS ClientBridge not available in shell.");
                                if (proxyErrorName && window[proxyErrorName]) {
                                    window[proxyErrorName]({
                                        code: 500,
                                        message: "ClientBridge not available"
                                    });
                                }
                            }
                        } else {
                            if (window.androidBridge && window.androidBridge.callNativeAsync) {
                                window.androidBridge.callNativeAsync(method, JSON.stringify(bridgeData || {}), proxySuccessName);
                            } else {
                                console.warn("[ColorboxAI.Shell.BridgeProxy] androidBridge not available in shell.");
                                if (proxySuccessName && window[proxySuccessName]) {
                                    window[proxySuccessName]({
                                        code: 500,
                                        message: "androidBridge not available"
                                    });
                                }
                            }
                        }
                    } catch (e) {
                        console.error("[ColorboxAI.Shell.BridgeProxy] Native bridge call failed:", e);
                        if (proxyErrorName && window[proxyErrorName]) {
                            window[proxyErrorName]({
                                code: 500,
                                message: e.message || String(e)
                            });
                        } else if (proxySuccessName && window[proxySuccessName]) {
                            window[proxySuccessName]({
                                code: 500,
                                message: e.message || String(e)
                            });
                        }
                    }
                }
                if (data.type === "oss.upload") {
                    var payload = data.payload || {};
                    var file = payload.file;
                    var filename = payload.filename || (file && file.name) || "user_upload.png";
                    var callbackId = payload.callbackId;
                    var uploadModule = payload.module || "colorbox-user-upload";
                    var uploadPath = "/colorbox";
                    // Map 'colorbox-user-upload' to the verified, authorized 'activity-screenshot-fed' credentials to prevent 403 errors
                    if (uploadModule === "colorbox-user-upload") {
                        uploadModule = "activity-screenshot-fed";
                        uploadPath = "/screenshot/activity/fed";
                    } else if (uploadModule === "colorbox-images") {
                        uploadPath = "/colorbox";
                    }
                    console.log("[ColorboxAI.OSS.Shell] Starting processing of upload. File info:", {
                        callbackId: callbackId,
                        filename: filename,
                        fileSize: file ? file.size : 0,
                        fileType: file ? file.type : "",
                        uploadModule: uploadModule,
                        uploadPath: uploadPath
                    });
                    if (!file) {
                        console.error("[ColorboxAI.OSS.Shell] Error: No file provided in the upload payload.");
                        try {
                            event.source.postMessage({
                                protocol: "colorbox-ai-bridge",
                                version: 1,
                                direction: "host-to-frame",
                                type: "oss.upload.callback",
                                payload: {
                                    callbackId: callbackId,
                                    error: "No file provided"
                                }
                            }, "*");
                        } catch (err) {
                            console.error("[ColorboxAI.OSS.Shell.OssProxy] Failed to post error callback to iframe:", err);
                        }
                    } else {
                        var ext = "";
                        var dotIdx = filename.lastIndexOf(".");
                        if (dotIdx >= 0) {
                            ext = filename.substring(dotIdx);
                        }
                        var now = new Date();
                        var Y = now.getFullYear();
                        var M = now.getMonth() + 1;
                        var D = now.getDate();
                        var uniqueId = (Y % 100) + "" + M + D + "-" + Math.random().toString(36).slice(-6);
                        var objectKey = "user-upload/" + uniqueId + ext;
                        console.log("[ColorboxAI.OSS.Shell] Generated OSS objectKey:", objectKey);
                        ensureOssSdk()
                            .then(function() {
                                var hostOssClient = null;
                                console.log("[ColorboxAI.OSS.Shell] Resolving OSS SDK client...");
                                if (window.__colorbox_kaleido_oss__) {
                                    console.log("[ColorboxAI.OSS.Shell] Found pre-initialized window.__colorbox_kaleido_oss__ client.");
                                    hostOssClient = window.__colorbox_kaleido_oss__;
                                } else {
                                    console.log("[ColorboxAI.OSS.Shell] Pre-initialized client not found. Checking window.KaleidoOSS or require('@hupu/kaleido-fed-sdk')...");
                                    var KaleidoOSS = window.KaleidoOSS || (typeof require === "function" ? require("@hupu/kaleido-fed-sdk") : null);
                                    if (KaleidoOSS) {
                                        console.log("[ColorboxAI.OSS.Shell] Found KaleidoOSS SDK. Instantiating new client...");
                                        hostOssClient = new KaleidoOSS({
                                            appId: "b1AcxWKA1u0hyDYv5kXgImZBRSQ=",
                                            module: uploadModule,
                                            path: uploadPath,
                                            sk: "HioGpkmGe9bsW0iqRLJEyGoLr4Q=",
                                            action: "1"
                                        });
                                        if (typeof hostOssClient.start === "function") {
                                            console.log("[ColorboxAI.OSS.Shell] Calling hostOssClient.start()...");
                                            hostOssClient.start();
                                        }
                                        window.__colorbox_kaleido_oss__ = hostOssClient;
                                    } else {
                                        console.warn("[ColorboxAI.OSS.Shell] Both window.KaleidoOSS and require('@hupu/kaleido-fed-sdk') are undefined/not found.");
                                    }
                                }
                                if (!hostOssClient) {
                                    console.error("[ColorboxAI.OSS.Shell] Critical Error: Hupu KaleidoOSS SDK is not available in host shell environment!");
                                    throw new Error("Hupu KaleidoOSS SDK is not available in host shell environment");
                                }
                                console.log("[ColorboxAI.OSS.Shell] Initiating multipartUpload for key:", objectKey);
                                return hostOssClient.multipartUpload(objectKey, file, {});
                            })
                            .then(function(res) {
                                console.log("[ColorboxAI.OSS.Shell] multipartUpload resolved successfully:", res);
                                var downloadUrl = res.downloadUrl || ("https://activity-static.hoopchina.com.cn/" + res.name);
                                console.log("[ColorboxAI.OSS.Shell] Resulting downloadUrl:", downloadUrl);
                                try {
                                    event.source.postMessage({
                                        protocol: "colorbox-ai-bridge",
                                        version: 1,
                                        direction: "host-to-frame",
                                        type: "oss.upload.callback",
                                        payload: {
                                            callbackId: callbackId,
                                            downloadUrl: downloadUrl,
                                            name: res.name
                                        }
                                    }, "*");
                                } catch (err) {
                                    console.error("[ColorboxAI.OSS.Shell.OssProxy] Failed to post success callback to iframe:", err);
                                }
                            })
                            .catch(function(err) {
                                console.error("[ColorboxAI.OSS.Shell] Exception caught during upload setup or execution:", err);
                                try {
                                    event.source.postMessage({
                                        protocol: "colorbox-ai-bridge",
                                        version: 1,
                                        direction: "host-to-frame",
                                        type: "oss.upload.callback",
                                        payload: {
                                            callbackId: callbackId,
                                            error: err.message || String(err)
                                        }
                                    }, "*");
                                } catch (postErr) {
                                    console.error("[ColorboxAI.OSS.Shell.OssProxy] Failed to post catch error callback to iframe:", postErr);
                                }
                            });
                    }
                }
                if (data.type === "runtime.error") {
                    console.error("[AI Runtime]", data.payload);
                    if (window.WebGuard && window.WebGuard.hupuLog) {
                        window.WebGuard.hupuLog(data.payload);
                    }
                }
            }
            window.__colorbox_runtime__ = true;
            window.__colorbox_ai_shell__ = true;
            window.__colorbox_ai_project__ = {
                projectId: projectId,
                settings: settings
            };
            window.__colorbox_ai_bridge_events__ = bridgeEvents;
            window.__colorbox_ai_track_queue__ = trackQueue;
            window.__colorbox_ai_track_debug__ = trackDebugLog;
            window.__colorbox_ai_shell_track_rev__ = SHELL_TRACK_RUNTIME_REV;
            pushTrackDebug("shell.boot", Object.assign({
                shellRev: SHELL_TRACK_RUNTIME_REV,
                projectId: projectId
            }, detectAppWebView()));
            window.globalState = globalState;
            window.__colorbox_get_globalState__ = function() {
                return window.globalState || {};
            };
            window.ColorboxAIHost = {
                bridgeSend: rawBridgeSend,
                setNativeShare: setNativeShare,
                track: track
            };
            window.addEventListener("message", receive);
            window.addEventListener("error", function(event) {
                bridgeEvents.push({
                    protocol: "colorbox-ai-bridge",
                    version: 1,
                    direction: "shell",
                    projectId: projectId,
                    type: "shell.error",
                    payload: {
                        message: event.message,
                        sourceFile: event.filename,
                        line: event.lineno,
                        column: event.colno
                    },
                    timestamp: Date.now()
                });
            }, true);
            window.addEventListener("unhandledrejection", function(event) {
                bridgeEvents.push({
                    protocol: "colorbox-ai-bridge",
                    version: 1,
                    direction: "shell",
                    projectId: projectId,
                    type: "shell.error",
                    payload: {
                        message: event.reason && event.reason.message || String(event.reason || ""),
                        stack: event.reason && event.reason.stack || ""
                    },
                    timestamp: Date.now()
                });
            });
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", function() {
                    setupViewport();
                    setNativeShare();
                    track({
                        act: "onload"
                    });
                });
            } else {
                setupViewport();
                setNativeShare();
                track({
                    act: "onload"
                });
            }
        })();
    </script>
